services:
  api:
    build:
      context: ./backend
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql+psycopg://usedcar:usedcar@db:5432/usedcar
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - LOCAL_STORAGE_DIR=/data/uploads
      - PUBLIC_BASE_URL=http://localhost:8000
    volumes:
      - ./backend:/app
      - ./data/uploads:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app worker -l info -Q analysis
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql+psycopg://usedcar:usedcar@db:5432/usedcar
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - LOCAL_STORAGE_DIR=/data/uploads
      - PUBLIC_BASE_URL=http://localhost:8000
    volumes:
      - ./backend:/app
      - ./data/uploads:/data/uploads
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=usedcar
      - POSTGRES_PASSWORD=usedcar
      - POSTGRES_DB=usedcar
    ports:
      - "5432:5432"
    volumes:
      - usedcar_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - usedcar_redis:/data

volumes:
  usedcar_pg:
  usedcar_redis:

